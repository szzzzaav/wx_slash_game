<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>刷游戏 · 首页 Feed</title>
  <link rel="stylesheet" href="../assets/app.css" />
</head>
<body data-page="feed">
  <main class="phone-stage">
    <section class="phone-screen" data-od-id="feed-screen" aria-label="首页 Game Feed">
      <div class="cover-scene" aria-hidden="true">
        <div class="island">
          <i class="tile a"></i><i class="tile b"></i><i class="tile c"></i><i class="tile d"></i>
          <i class="bridge"></i><i class="tower"></i><i class="portal"></i><i class="character"></i>
        </div>
      </div>
      <div class="status-bar"><span>20:28</span><span class="status-icons"><i class="dot"></i><i class="dot"></i><i class="dot"></i><span>86%</span></span></div>
      <div class="ps-symbols" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
      <div class="page-top">
        <div class="title-block"><strong>刷游戏</strong><span data-disliked>左滑可减少此类游戏</span></div>
        <div class="mini-avatar"></div>
      </div>
      <div class="scene-label" data-scene-label>自动演示 01 · 旋转平台</div>
      <aside class="side-actions" aria-label="媒体操作栏">
        <button class="side-action" data-toggle-action="like" data-toast="已点赞"><span class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M12 21s-7-4.4-7-10a4 4 0 0 1 7-2.4A4 4 0 0 1 19 11c0 5.6-7 10-7 10z"/></svg></span><span>12.8k</span></button>
        <button class="side-action" data-comment-trigger><span class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M4 6.5A3.5 3.5 0 0 1 7.5 3h9A3.5 3.5 0 0 1 20 6.5v5A3.5 3.5 0 0 1 16.5 15H10l-5 4v-4.5A3.5 3.5 0 0 1 4 12V6.5z"/></svg></span><span data-comment-count>486</span></button>
        <button class="side-action" data-toggle-action="save" data-toast="已收藏"><span class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M6 4h12v17l-6-3-6 3V4z"/></svg></span><span>收藏</span></button>
        <button class="side-action" data-toast="分享卡片已生成"><span class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M8 12h8M14 6l6 6-6 6M4 5v14"/></svg></span><span>分享</span></button>
      </aside>
      <div class="drawer-backdrop" data-comment-backdrop></div>
      <section class="comment-drawer" data-comment-drawer aria-hidden="true" aria-label="游戏评论">
        <div class="drawer-handle"></div>
        <header class="drawer-head">
          <div><strong>评论</strong><span>486 条讨论 · 按热度排序</span></div>
          <button class="drawer-close" data-comment-close aria-label="关闭评论"><svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
        </header>
        <div class="comment-list" data-comment-list>
          <article class="comment-item">
            <span class="comment-avatar"></span>
            <div><strong>山间回声 <em>刚刚</em></strong><p>旋转平台的节奏很舒服，像一局很短的空间谜题。</p></div>
          </article>
          <article class="comment-item">
            <span class="comment-avatar"></span>
            <div><strong>南风试玩 <em>2 分钟前</em></strong><p>出口藏得克制，不会一眼看到，但也没有故意为难。</p></div>
          </article>
          <article class="comment-item">
            <span class="comment-avatar"></span>
            <div><strong>青灰色 <em>8 分钟前</em></strong><p>希望下次生成能保留这个等距镜头。</p></div>
          </article>
        </div>
        <form class="comment-compose" data-comment-form>
          <input data-comment-input type="text" placeholder="写下试玩感受" aria-label="写评论" />
          <button type="submit">发送</button>
        </form>
      </section>
      <div class="feed-caption">
        <div class="creator-row"><span class="mini-avatar"></span><span data-game-creator>由 Lumen 创建</span></div>
        <h1 class="game-title" data-game-title>空中回廊</h1>
        <div class="tag-row">
          <span class="tag ai">AI 生成</span>
          <span class="tag ps">手柄几何</span>
          <span class="tag" data-game-meta>解谜 · 中等 · 4 分钟</span>
        </div>
        <button class="btn btn-primary" data-play><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg>开始玩</button>
      </div>
      <nav class="bottom-nav" aria-label="底部导航">
        <a class="nav-item active" href="01-feed.html"><svg class="icon" viewBox="0 0 24 24"><path d="M4 12h16M12 4v16"/></svg><span>刷</span></a>
        <a class="nav-item" href="03-workshop.html"><svg class="icon" viewBox="0 0 24 24"><path d="M5 19 19 5M14 5h5v5"/></svg><span>创作</span></a>
        <a class="nav-item" href="04-generating.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/></svg><span>生成</span></a>
        <a class="nav-item" href="05-profile.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
