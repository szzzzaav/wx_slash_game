<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>刷游戏 · AI 生成进度</title>
  <link rel="stylesheet" href="../assets/app.css" />
</head>
<body data-page="generating">
  <main class="phone-stage">
    <section class="phone-screen" data-od-id="generating-screen" aria-label="AI 生成进度与游戏预览">
      <div class="status-bar"><span>20:28</span><span class="status-icons"><i class="dot"></i><i class="dot"></i><i class="dot"></i><span>86%</span></span></div>
      <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
      <div class="page-top">
        <div class="title-block"><strong>正在生成</strong><span data-status>匹配模板</span></div>
        <button class="icon-btn" data-regenerate aria-label="重新生成"><svg class="icon" viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.7M20 4v6h-6"/></svg></button>
      </div>
      <div class="panel-scroll">
        <div class="progress-orb" style="--progress: 36;">
          <div><strong data-percent>36%</strong><span>3-10 秒预估</span></div>
        </div>
        <article class="card glass ps-line">
          <div class="preview-mini">
            <div class="cover-scene" aria-hidden="true">
              <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
              <div class="island">
                <i class="tile a"></i><i class="tile b"></i><i class="tile c"></i><i class="tile d"></i>
                <i class="bridge"></i><i class="tower"></i><i class="portal"></i><i class="character"></i>
              </div>
            </div>
          </div>
          <div style="margin-top: 12px;">
            <h1 class="game-title" style="font-size: 20px;">天空城堡 · 旋转平台</h1>
            <p style="color: var(--muted); font-size: 13px; line-height: 1.55;">已生成第一段可玩路径，正在验证出口可达性与节奏。</p>
          </div>
        </article>
        <div class="section-title"><h2>生成流程</h2><span>轻量状态</span></div>
        <div class="steps">
          <div class="step done" data-label="理解创意"><i>1</i><span><strong>理解创意</strong><span>提取天空城堡、解谜、旋转平台</span></span><em class="tag">完成</em></div>
          <div class="step active" data-label="匹配模板"><i>2</i><span><strong>匹配模板</strong><span>选择正交等距关卡骨架</span></span><em class="tag">进行中</em></div>
          <div class="step" data-label="生成关卡"><i>3</i><span><strong>生成关卡</strong><span>铺设平台、机关与出口</span></span><em class="tag">等待</em></div>
          <div class="step" data-label="验证可玩性"><i>4</i><span><strong>验证可玩性</strong><span>检查路径闭环与卡死点</span></span><em class="tag">等待</em></div>
          <div class="step" data-label="渲染预览"><i>5</i><span><strong>渲染预览</strong><span>输出封面与首屏试玩</span></span><em class="tag">等待</em></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;">
          <a class="btn btn-outline" href="03-workshop.html">调整 Prompt</a>
          <a class="btn btn-primary" href="02-game-overlay.html">预览试玩</a>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="底部导航">
        <a class="nav-item" href="01-feed.html"><svg class="icon" viewBox="0 0 24 24"><path d="M4 12h16M12 4v16"/></svg><span>刷</span></a>
        <a class="nav-item" href="03-workshop.html"><svg class="icon" viewBox="0 0 24 24"><path d="M5 19 19 5M14 5h5v5"/></svg><span>创作</span></a>
        <a class="nav-item active" href="04-generating.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/></svg><span>生成</span></a>
        <a class="nav-item" href="05-profile.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
