<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>刷游戏 · 游戏详情覆盖层</title>
  <link rel="stylesheet" href="../assets/app.css" />
</head>
<body>
  <main class="phone-stage">
    <section class="phone-screen" data-od-id="overlay-screen" aria-label="当前游戏详情与试玩覆盖层">
      <div class="status-bar"><span>20:28</span><span class="status-icons"><i class="dot"></i><i class="dot"></i><i class="dot"></i><span>86%</span></span></div>
      <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
      <div class="page-top">
        <a class="icon-btn" href="01-feed.html" aria-label="返回"><svg class="icon" viewBox="0 0 24 24"><path d="M15 6 9 12l6 6"/></svg></a>
        <button class="icon-btn" data-toast="已加入收藏" aria-label="收藏"><svg class="icon" viewBox="0 0 24 24"><path d="M6 4h12v17l-6-3-6 3V4z"/></svg></button>
      </div>
      <div class="panel-scroll">
        <div class="detail-hero">
            <div class="cover-scene" aria-hidden="true">
            <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
            <div class="island">
              <i class="tile a"></i><i class="tile b"></i><i class="tile c"></i><i class="tile d"></i>
              <i class="bridge"></i><i class="tower"></i><i class="portal"></i><i class="character"></i>
            </div>
          </div>
          <div class="overlay-controls">
            <button class="btn btn-primary" data-toast="试玩已开始"><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg>试玩 45 秒</button>
            <button class="btn btn-ghost" data-toast="分享卡已生成">分享</button>
          </div>
        </div>
        <article class="card glass ps-line">
          <div class="creator-row"><span class="mini-avatar"></span><span>由 Lumen 创建 · prompt 生成</span></div>
          <h1 class="game-title">空中回廊</h1>
          <p style="color: var(--meta); font-size: 14px; line-height: 1.55;">旋转悬浮平台，给小小旅人铺出通往出口的角度。每次滑动都会改变路径，而不是改变视角。</p>
          <div class="tag-row">
            <span class="tag ai">AI 生成</span><span class="tag ps">手柄几何</span><span class="tag">解谜</span><span class="tag">中等</span><span class="tag">4 分钟</span>
          </div>
        </article>
        <div class="section-title"><h2>试玩状态</h2><span>轻量覆盖层</span></div>
        <div class="stat-grid">
          <div class="stat-card"><strong>3/7</strong><span>已解机关</span></div>
          <div class="stat-card"><strong>01:18</strong><span>当前用时</span></div>
          <div class="stat-card"><strong>A-</strong><span>可玩性评分</span></div>
        </div>
        <div class="section-title"><h2>相似玩法</h2><span>继续刷</span></div>
        <div class="history-list">
          <a class="history-item" href="01-feed.html"><span class="thumb"></span><span><strong>镜面庭院</strong><span>反射路径 · 3 分钟</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></a>
          <a class="history-item" href="01-feed.html"><span class="thumb"></span><span><strong>雾塔归路</strong><span>平台跳跃 · 5 分钟</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></a>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="底部导航">
        <a class="nav-item active" href="01-feed.html"><svg class="icon" viewBox="0 0 24 24"><path d="M4 12h16M12 4v16"/></svg><span>刷</span></a>
        <a class="nav-item" href="03-workshop.html"><svg class="icon" viewBox="0 0 24 24"><path d="M5 19 19 5M14 5h5v5"/></svg><span>创作</span></a>
        <a class="nav-item" href="04-generating.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 1-9 9"/></svg><span>生成</span></a>
        <a class="nav-item" href="05-profile.html"><svg class="icon" viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM4 21a8 8 0 0 1 16 0"/></svg><span>我的</span></a>
      </nav>
    </section>
  </main>
  <script src="../assets/app.js"></script>
</body>
</html>
