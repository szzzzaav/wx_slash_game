<body data-page="profile">
  <main class="phone-stage">
    <section class="phone-screen" data-od-id="profile-screen" aria-label="我的页面">
      <div class="status-bar"><span>20:28</span><span class="status-icons"><i class="dot"></i><i class="dot"></i><i class="dot"></i><span>86%</span></span></div>
      <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
      <div class="page-top">
        <div class="title-block"><strong>我的</strong><span>游玩与创作资产</span></div>
        <button class="icon-btn" data-toast="设置已打开" aria-label="设置"><svg class="icon" viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/><path d="M4 12h2m12 0h2M12 4v2m0 12v2M6.3 6.3l1.4 1.4m8.6 8.6 1.4 1.4m0-11.4-1.4 1.4m-8.6 8.6-1.4 1.4"/></svg></button>
      </div>
      <div class="panel-scroll">
        <article class="profile-head glass ps-line">
          <div class="ps-symbols compact" aria-hidden="true"><i class="tri"></i><i class="circle"></i><i class="cross"></i><i class="square"></i></div>
          <div class="profile-row">
            <span class="profile-avatar"></span>
            <div>
              <h1>夜航玩家</h1>
              <p>偏好：解谜、等距、短局</p>
            </div>
          </div>
          <div class="profile-stats">
            <div class="stat-card"><strong>128</strong><span>游玩局数</span></div>
            <div class="stat-card"><strong>16</strong><span>已生成</span></div>
            <div class="stat-card"><strong>9</strong><span>成就</span></div>
          </div>
        </article>
        <div class="section-title"><h2>资产</h2><span>快速切换</span></div>
        <div class="segmented">
          <button class="active" data-profile-tab>记录</button><button data-profile-tab>成就</button><button data-profile-tab>生成</button>
        </div>
        <div class="section-title"><h2>最近游玩</h2><span>继续</span></div>
        <div class="history-list">
          <a class="history-item" href="02-game-overlay.html"><span class="thumb"></span><span><strong>空中回廊</strong><span>进度 42% · 01:18</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg></a>
          <a class="history-item" href="02-game-overlay.html"><span class="thumb"></span><span><strong>镜面庭院</strong><span>已通关 · A 评分</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7-11-7z"/></svg></a>
        </div>
        <div class="section-title"><h2>成就</h2><span>本周</span></div>
        <div class="stat-grid">
          <div class="stat-card"><strong>首发</strong><span>发布首个游戏</span></div>
          <div class="stat-card"><strong>连刷</strong><span>7 天活跃</span></div>
          <div class="stat-card"><strong>解构</strong><span>完成 5 个谜题</span></div>
        </div>
        <div class="section-title"><h2>生成历史</h2><span>草稿可继续</span></div>
        <div class="history-list">
          <a class="history-item" href="03-workshop.html"><span class="thumb"></span><span><strong>玻璃迷宫</strong><span>草稿 · 待验证可玩性</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></a>
          <a class="history-item" href="04-generating.html"><span class="thumb"></span><span><strong>云端避让</strong><span>已生成 · 可发布</span></span><svg class="icon" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></a>
        </div>
      </div>
      <nav class="bottom-nav" aria-label="底部导航">
        <a class="nav-item" href="01-feed.html"><svg class="icon" viewBox="0 0 24 24"><path d="M4 12h16M12 4v16"/></svg><span>刷</span></a>
